name: Release

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  statuses: write
  id-token: write

jobs:
  # ── Builds ────────────────────────────────────────────────────────────
  # Each build bakes its own VITE_DOTNS_ID (and per-env contract addresses via
  # the env file) matching its deploy target; emit-manifest then freezes a
  # bulletin-deploy manifest into out/ with that same domain so the product
  # manifest publishes on every deploy. Staging and prod are split because prod
  # is release-gated; within each, the matrix covers admin/attendee × network.
  build-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build ${{ matrix.app }} (staging ${{ matrix.network }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: admin,    network: v2,         env-file: .github/env,            dotns-id: stg.web3summit-admin.dot, artifact: admin-build-stg-v2 }
          - { app: attendee, network: v2,         env-file: .github/env,            dotns-id: stg.web3summit.dot,       artifact: attendee-build-stg-v2 }
          - { app: admin,    network: previewnet, env-file: .github/env.previewnet, dotns-id: stg.web3summit-admin.dot, artifact: admin-build-stg-previewnet }
          - { app: attendee, network: previewnet, env-file: .github/env.previewnet, dotns-id: stg.web3summit.dot,       artifact: attendee-build-stg-previewnet }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Load environment config
        run: grep -v '^#' ${{ matrix.env-file }} | grep -v '^$' >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: |
          export VITE_BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          npm run -w packages/${{ matrix.app }} build
          node scripts/bundle-worker-into.mjs ${{ matrix.app }}
          node scripts/deploy/emit-manifest.mjs packages/${{ matrix.app }}
        env:
          NITRO_PRESET: static
          VITE_BUILD_HASH: ${{ github.sha }}
          VITE_DOTNS_ID: ${{ matrix.dotns-id }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/${{ matrix.app }}/out
          retention-days: 7

  build-prod:
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Build ${{ matrix.app }} (production ${{ matrix.network }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: admin,    network: v2,         env-file: .github/env.production, dotns-id: web3summit-admin.dot, artifact: admin-build-prod-v2 }
          - { app: attendee, network: v2,         env-file: .github/env.production, dotns-id: web3summit.dot,       artifact: attendee-build-prod-v2 }
          - { app: admin,    network: previewnet, env-file: .github/env.previewnet, dotns-id: web3summit-admin.dot, artifact: admin-build-prod-previewnet }
          - { app: attendee, network: previewnet, env-file: .github/env.previewnet, dotns-id: web3summit.dot,       artifact: attendee-build-prod-previewnet }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Load environment config
        run: grep -v '^#' ${{ matrix.env-file }} | grep -v '^$' >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: |
          export VITE_BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          npm run -w packages/${{ matrix.app }} build
          node scripts/bundle-worker-into.mjs ${{ matrix.app }}
          node scripts/deploy/emit-manifest.mjs packages/${{ matrix.app }}
        env:
          NITRO_PRESET: static
          VITE_BUILD_HASH: ${{ github.sha }}
          VITE_DOTNS_ID: ${{ matrix.dotns-id }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/${{ matrix.app }}/out
          retention-days: 7

  # ── Staging on paseo-next-v2 (push to main only) ──────────────────────
  deploy-admin-stg-v2:
    needs: build-staging
    if: github.event_name == 'push'
    name: Deploy admin → staging (paseo-next-v2)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: stg.web3summit-admin.dot
      artifact-name: admin-build-stg-v2
      env: paseo-next-v2
      max-retries: 3
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-attendee-stg-v2:
    needs: [build-staging, deploy-admin-stg-v2]
    if: github.event_name == 'push'
    name: Deploy festival → staging (paseo-next-v2)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: stg.web3summit.dot
      artifact-name: attendee-build-stg-v2
      env: paseo-next-v2
      max-retries: 3
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Production on paseo-next-v2 (release only) ────────────────────────
  deploy-admin-prod-v2:
    needs: build-prod
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Deploy admin → production (paseo-next-v2)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: web3summit-admin.dot
      artifact-name: admin-build-prod-v2
      env: paseo-next-v2
      max-retries: 3
      publish: true
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-attendee-prod-v2:
    needs: [build-prod, deploy-admin-prod-v2]
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Deploy festival → production (paseo-next-v2)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: web3summit.dot
      artifact-name: attendee-build-prod-v2
      env: paseo-next-v2
      max-retries: 3
      publish: true
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Staging on previewnet (push to main only) ─────────────────────────
  # Independent chain (different asset-hub → independent nonce), so the
  # previewnet deploy chain runs in parallel with the paseo-next-v2 one.
  deploy-admin-stg-previewnet:
    needs: build-staging
    if: github.event_name == 'push'
    name: Deploy admin → staging (previewnet)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: stg.web3summit-admin.dot
      artifact-name: admin-build-stg-previewnet
      env: preview
      max-retries: 3
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-attendee-stg-previewnet:
    needs: [build-staging, deploy-admin-stg-previewnet]
    if: github.event_name == 'push'
    name: Deploy festival → staging (previewnet)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: stg.web3summit.dot
      artifact-name: attendee-build-stg-previewnet
      env: preview
      max-retries: 3
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Production on previewnet (release only) ───────────────────────────
  deploy-admin-prod-previewnet:
    needs: build-prod
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Deploy admin → production (previewnet)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: web3summit-admin.dot
      artifact-name: admin-build-prod-previewnet
      env: preview
      max-retries: 3
      publish: true
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  deploy-attendee-prod-previewnet:
    needs: [build-prod, deploy-admin-prod-previewnet]
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/v')
    name: Deploy festival → production (previewnet)
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      dotns-domain: web3summit.dot
      artifact-name: attendee-build-prod-previewnet
      env: preview
      max-retries: 3
      publish: true
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # ── Post-deploy: update release notes ─────────────────────────────────
  post-deploy:
    needs:
      - deploy-admin-prod-v2
      - deploy-attendee-prod-v2
      - deploy-admin-prod-previewnet
      - deploy-attendee-prod-previewnet
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    name: Update release notes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load contract addresses
        run: |
          grep -v '^#' .github/env.production | grep -v '^$' >> $GITHUB_ENV
          grep -v '^#' .github/env.previewnet | grep -v '^$' | sed 's/^/PN_/' >> $GITHUB_ENV

      - name: Update release with deployment info
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          ADMIN_FQDN: ${{ needs.deploy-admin-prod-v2.outputs.domain }}.dot
          ADMIN_URL: https://${{ needs.deploy-admin-prod-v2.outputs.domain }}.dot.li
          ATTENDEE_FQDN: ${{ needs.deploy-attendee-prod-v2.outputs.domain }}.dot
          ATTENDEE_URL: https://${{ needs.deploy-attendee-prod-v2.outputs.domain }}.dot.li
          ADMIN_CID_V2: ${{ needs.deploy-admin-prod-v2.outputs.cid }}
          ATTENDEE_CID_V2: ${{ needs.deploy-attendee-prod-v2.outputs.cid }}
          ADMIN_CID_PN: ${{ needs.deploy-admin-prod-previewnet.outputs.cid }}
          ATTENDEE_CID_PN: ${{ needs.deploy-attendee-prod-previewnet.outputs.cid }}
        run: |
          EXISTING=$(gh release view "$TAG" --json body -q .body)

          DEPLOY_INFO=$(cat <<EOF

          ---

          ### Deployment

          | App | Network | Domain | CID | URL |
          |-----|---------|--------|-----|-----|
          | **Admin** | paseo-next-v2 | \`${ADMIN_FQDN}\` | \`${ADMIN_CID_V2}\` | ${ADMIN_URL} |
          | **Festival** | paseo-next-v2 | \`${ATTENDEE_FQDN}\` | \`${ATTENDEE_CID_V2}\` | ${ATTENDEE_URL} |
          | **Admin** | previewnet | \`${ADMIN_FQDN}\` | \`${ADMIN_CID_PN}\` | ${ADMIN_URL} |
          | **Festival** | previewnet | \`${ATTENDEE_FQDN}\` | \`${ATTENDEE_CID_PN}\` | ${ATTENDEE_URL} |

          ### Contracts — paseo-next-v2 (${VITE_NETWORK})

          | Contract | Address |
          |----------|---------|
          | Festival | \`${VITE_FESTIVAL_ADDRESS}\` |
          | Festival POAP | \`${VITE_FESTIVAL_POAP_ADDRESS}\` |
          | Session POAP | \`${VITE_SUB_EVENT_POAP_ADDRESS}\` |
          | Multicall | \`${VITE_MULTICALL_ADDRESS}\` |

          ### Contracts — previewnet (${PN_VITE_NETWORK})

          | Contract | Address |
          |----------|---------|
          | Festival | \`${PN_VITE_FESTIVAL_ADDRESS}\` |
          | Festival POAP | \`${PN_VITE_FESTIVAL_POAP_ADDRESS}\` |
          | Session POAP | \`${PN_VITE_SUB_EVENT_POAP_ADDRESS}\` |
          | Multicall | \`${PN_VITE_MULTICALL_ADDRESS}\` |
          EOF
          )

          gh release edit "$TAG" --notes "${EXISTING}${DEPLOY_INFO}"
