<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="320" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="#2d3436">Funkhaus Nalepastraße — Block C First Floor (1.OG)</text>

  <!-- ============ BUILDING SHELL ============ -->
  <rect x="30" y="40" width="840" height="240" rx="2" fill="none" stroke="#2d3436" stroke-width="3.5"/>

  <!-- ============ ROOMS ============ -->

  <!-- Stage -->
  <rect x="38" y="50" width="70" height="220" rx="2" fill="#d63031" fill-opacity="0.22" stroke="#636e72" stroke-width="1.2"/>
  <text x="73" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3436" transform="rotate(-90,73,165)">Stage</text>

  <!-- Kultursaal -->
  <rect x="112" y="50" width="440" height="220" rx="2" fill="#e17055" fill-opacity="0.13" stroke="#636e72" stroke-width="1.2"/>
  <text x="332" y="160" text-anchor="middle" font-size="20" font-weight="700" fill="#2d3436">Kultursaal</text>

  <!-- Windows top -->
  <line x1="120" y1="43" x2="133" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="159" y1="43" x2="172" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="198" y1="43" x2="211" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="237" y1="43" x2="250" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="276" y1="43" x2="289" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="315" y1="43" x2="328" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="354" y1="43" x2="367" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="393" y1="43" x2="406" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="432" y1="43" x2="445" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="471" y1="43" x2="484" y2="43" stroke="#636e72" stroke-width="1.5"/>
  <line x1="510" y1="43" x2="523" y2="43" stroke="#636e72" stroke-width="1.5"/>

  <!-- Windows bottom -->
  <line x1="120" y1="277" x2="133" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="159" y1="277" x2="172" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="198" y1="277" x2="211" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="237" y1="277" x2="250" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="276" y1="277" x2="289" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="315" y1="277" x2="328" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="354" y1="277" x2="367" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="393" y1="277" x2="406" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="432" y1="277" x2="445" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="471" y1="277" x2="484" y2="277" stroke="#636e72" stroke-width="1.5"/>
  <line x1="510" y1="277" x2="523" y2="277" stroke="#636e72" stroke-width="1.5"/>

  <!-- Dividing wall -->
  <line x1="555" y1="48" x2="555" y2="275" stroke="#2d3436" stroke-width="2"/>

  <!-- Star 1 -->
  <rect x="560" y="50" width="120" height="90" rx="2" fill="#fdcb6e" fill-opacity="0.2" stroke="#636e72" stroke-width="1"/>
  <text x="620" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3436">Star 1</text>

  <!-- Small room next to Star 1 -->
  <rect x="685" y="50" width="70" height="90" rx="2" fill="#fdcb6e" fill-opacity="0.12" stroke="#636e72" stroke-width="0.8"/>

  <!-- Foyer -->
  <rect x="560" y="145" width="240" height="120" rx="2" fill="#74b9ff" fill-opacity="0.18" stroke="#636e72" stroke-width="1.2"/>
  <text x="680" y="210" text-anchor="middle" font-size="15" font-weight="600" fill="#2d3436">Foyer</text>

  <!-- Restrooms -->
  <rect x="810" y="50" width="52" height="220" rx="2" fill="#fab1a0" fill-opacity="0.25" stroke="#636e72" stroke-width="1"/>
  <text x="836" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#2d3436" transform="rotate(-90,836,165)">WC</text>

  <!-- ============ STAIRS ============ -->
  <!-- Stair near Star 1 -->
  <rect x="560" y="50" width="18" height="18" rx="2" fill="#ff7675" fill-opacity="0.45" stroke="#636e72" stroke-width="1"/>
  <line x1="562" y1="55" x2="576" y2="55" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>
  <line x1="562" y1="59" x2="576" y2="59" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>
  <line x1="562" y1="63" x2="576" y2="63" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>

  <!-- Stair near Foyer -->
  <rect x="760" y="147" width="18" height="18" rx="2" fill="#ff7675" fill-opacity="0.45" stroke="#636e72" stroke-width="1"/>
  <line x1="762" y1="152" x2="776" y2="152" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>
  <line x1="762" y1="156" x2="776" y2="156" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>
  <line x1="762" y1="160" x2="776" y2="160" stroke="#636e72" stroke-width="0.5" opacity="0.5"/>

  <!-- ============ ENTRANCE MARKERS ============ -->
  <circle cx="112" cy="48" r="9" fill="#fff" stroke="#d63031" stroke-width="1.5"/>
  <text x="112" y="52" text-anchor="middle" font-size="8" font-weight="700" fill="#d63031">B</text>
  <circle cx="112" cy="272" r="9" fill="#fff" stroke="#d63031" stroke-width="1.5"/>
  <text x="112" y="276" text-anchor="middle" font-size="8" font-weight="700" fill="#d63031">A</text>
  <circle cx="38" cy="48" r="9" fill="#fff" stroke="#d63031" stroke-width="1.5"/>
  <text x="38" y="52" text-anchor="middle" font-size="8" font-weight="700" fill="#d63031">C</text>
  <circle cx="38" cy="272" r="9" fill="#fff" stroke="#d63031" stroke-width="1.5"/>
  <text x="38" y="276" text-anchor="middle" font-size="8" font-weight="700" fill="#d63031">D</text>

  <!-- Power info -->
  <text x="620" y="135" text-anchor="middle" font-size="7" fill="#b2bec3" font-style="italic">125A / 32A / 3× Schuko</text>

  <!-- ============ NORTH ARROW ============ -->
  <polygon points="870,32 865,46 870,40 875,46" fill="#636e72"/>
  <text x="870" y="28" text-anchor="middle" font-size="8" font-weight="700" fill="#636e72">N</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(30, 300)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#e17055" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="16" y="10" font-size="9" fill="#636e72">Kultursaal</text>
    <rect x="85" y="0" width="12" height="12" rx="2" fill="#d63031" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="101" y="10" font-size="9" fill="#636e72">Stage</text>
    <rect x="145" y="0" width="12" height="12" rx="2" fill="#74b9ff" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="161" y="10" font-size="9" fill="#636e72">Foyer</text>
    <rect x="205" y="0" width="12" height="12" rx="2" fill="#fdcb6e" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="221" y="10" font-size="9" fill="#636e72">Star / Dressing</text>
    <rect x="315" y="0" width="12" height="12" rx="2" fill="#fab1a0" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="331" y="10" font-size="9" fill="#636e72">WC</text>
    <rect x="360" y="0" width="12" height="12" rx="2" fill="#ff7675" fill-opacity="0.5" stroke="#636e72" stroke-width="0.5"/>
    <text x="376" y="10" font-size="9" fill="#636e72">Stairs</text>
  </g>
</svg>
